name: Setup Or Install Problem
description: Report trouble installing, running npx, initializing, or using setup-ui.
title: "[Setup]: "
labels:
  - setup
  - beta
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing ClawGuard. Please do not paste real secrets, private keys, customer data, or proprietary code.
  - type: dropdown
    id: setup_area
    attributes:
      label: Where did setup fail?
      options:
        - npx install or version command
        - agent init
        - setup-ui start
        - setup-ui preview
        - setup-ui apply
        - protected asset setup
        - Node/npm environment
        - Other
    validations:
      required: true
  - type: textarea
    id: commands
    attributes:
      label: Commands tried
      description: Paste the exact commands. Redact private paths if needed.
      render: bash
      placeholder: |
        npx --yes --package @denial-web/clawguard@beta clawguard --version
        npx --yes --package @denial-web/clawguard@beta clawguard setup-ui
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Error or output
      description: Paste the relevant terminal output. Redact tokens, secrets, and private paths.
      render: text
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, terminal, Node version, npm version, browser if setup-ui was involved.
      placeholder: macOS 15, zsh, Node 22, npm 10, Chrome
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety Check
      options:
        - label: I removed real secrets, tokens, credentials, customer data, and proprietary code from this report.
          required: true
