name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm test

  action-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          target: examples/declared-api-skill
          policy: governed
          fail-on: none
          fail-on-policy: "false"
          sarif: clawshield-smoke.sarif

      - run: test -s clawshield-smoke.sarif
