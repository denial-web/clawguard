name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm test

  action-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: ./
        with:
          target: examples/declared-api-skill
          policy: governed
          fail-on: none
          fail-on-policy: "false"
          sarif: clawguard-smoke.sarif

      - run: test -s clawguard-smoke.sarif
