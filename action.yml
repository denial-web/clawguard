name: ClawGuard
description: Scan OpenClaw-style skills and MCP configs for security and governance risk, and emit the clawguard.check.v1 decision contract.

inputs:
  target:
    description: Path to scan.
    required: false
    default: "."
  policy:
    description: Policy preset to apply.
    required: false
    default: governed
  fail-on:
    description: Risk level that should fail the workflow.
    required: false
    default: critical
  fail-on-policy:
    description: Whether policy decisions should fail the workflow.
    required: false
    default: "true"
  policy-fail-on:
    description: Policy decision threshold that should fail the workflow.
    required: false
    default: manual_review
  config:
    description: Optional .clawguard.json path.
    required: false
    default: ""
  sarif:
    description: SARIF output path. Set to an empty string to skip SARIF emission.
    required: false
    default: clawguard.sarif
  check:
    description: Emit clawguard.check.v1 JSON alongside SARIF. Set to "false" to skip.
    required: false
    default: "true"
  check-output:
    description: Path to write the clawguard.check.v1 JSON when check is enabled.
    required: false
    default: clawguard.check.json

outputs:
  decision:
    description: clawguard.check.v1 decision (allow, manual_review, or block). Empty when check is disabled.
    value: ${{ steps.check.outputs.decision }}
  risk:
    description: clawguard.check.v1 risk level (info, low, medium, high, critical). Empty when check is disabled.
    value: ${{ steps.check.outputs.risk }}
  summary:
    description: One-line summary from clawguard.check.v1. Empty when check is disabled.
    value: ${{ steps.check.outputs.summary }}
  recommended-action:
    description: clawguard.check.v1 recommendedAction (auto_install, require_user_approval, reject). Empty when check is disabled.
    value: ${{ steps.check.outputs.recommended-action }}
  check-json-path:
    description: Absolute path the clawguard.check.v1 JSON was written to. Empty when check is disabled.
    value: ${{ steps.check.outputs.json-path }}
  sarif-path:
    description: Absolute path the SARIF report was written to. Empty when sarif input is empty.
    value: ${{ steps.scan.outputs.sarif-path }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v5
      with:
        node-version: 24

    - name: Run ClawGuard scan
      id: scan
      shell: bash
      env:
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_FAIL_ON_POLICY: ${{ inputs.fail-on-policy }}
        INPUT_POLICY_FAIL_ON: ${{ inputs.policy-fail-on }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_SARIF: ${{ inputs.sarif }}
      run: |
        args=(
          scan
          "$INPUT_TARGET"
          --policy "$INPUT_POLICY"
          --fail-on "$INPUT_FAIL_ON"
          --policy-fail-on "$INPUT_POLICY_FAIL_ON"
        )

        if [ "$INPUT_FAIL_ON_POLICY" = "true" ]; then
          args+=(--fail-on-policy)
        fi

        if [ -n "$INPUT_CONFIG" ]; then
          args+=(--config "$INPUT_CONFIG")
        fi

        if [ -n "$INPUT_SARIF" ]; then
          args+=(--sarif "$INPUT_SARIF")
          echo "sarif-path=$(cd "$(dirname "$INPUT_SARIF")" && pwd)/$(basename "$INPUT_SARIF")" >> "$GITHUB_OUTPUT"
        else
          echo "sarif-path=" >> "$GITHUB_OUTPUT"
        fi

        node "$GITHUB_ACTION_PATH/src/cli.js" "${args[@]}"

    - name: Run ClawGuard check
      id: check
      if: always() && inputs.check == 'true'
      shell: bash
      env:
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_CHECK_OUTPUT: ${{ inputs.check-output }}
      run: |
        check_args=(
          check
          "$INPUT_TARGET"
          --policy "$INPUT_POLICY"
          --json
        )

        if [ -n "$INPUT_CONFIG" ]; then
          check_args+=(--config "$INPUT_CONFIG")
        fi

        set +e
        node "$GITHUB_ACTION_PATH/src/cli.js" "${check_args[@]}" > "$INPUT_CHECK_OUTPUT"
        check_exit=$?
        set -e

        if [ ! -s "$INPUT_CHECK_OUTPUT" ]; then
          echo "::error::clawguard check produced an empty payload at $INPUT_CHECK_OUTPUT (exit $check_exit)"
          exit 1
        fi

        node -e '
          const fs = require("node:fs");
          const filePath = process.argv[1];
          const payload = JSON.parse(fs.readFileSync(filePath, "utf8"));
          const setOutput = (key, value) => {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, key + "=" + (value == null ? "" : String(value)) + "\n");
          };
          setOutput("decision", payload.decision);
          setOutput("risk", payload.risk);
          setOutput("summary", payload.summary);
          setOutput("recommended-action", payload.recommendedAction);
          setOutput("json-path", require("node:path").resolve(filePath));
        ' "$INPUT_CHECK_OUTPUT"

        # The scan step already gates the workflow on policy decisions. The check
        # step's role here is to emit the artifact + outputs, not to re-fail.
        exit 0
